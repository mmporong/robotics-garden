# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
# Physical AI Lab 학습 가든 — 원본 노트는 private 리포(physical-ai-lab)에서 publish: true만 동기화됨
configuration:
  pageTitle: mmporong lab
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: ko-KR
  baseUrl: mmporong.github.io/robotics-garden
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: IBM Plex Sans KR
      body: IBM Plex Sans KR
      code: IBM Plex Mono
    # Stormy morning 팔레트 — 청회색(신뢰감). 폭풍우 아침 안개/습기의 블루그레이.
    # #6A89A7(뮤트 블루그레이) · #BDDDFC(라이트) · #88BDF2(액센트 블루) · #384959(다크 슬레이트)
    # 링크(secondary)는 라이트 배경 대비 4.5:1↑ 위해 계열에서 살짝 깊게.
    colors:
      lightMode:
        light: "#f3f7fb"
        lightgray: "#d3e0ec"
        gray: "#6a89a7"
        darkgray: "#3e5164"
        dark: "#384959"
        secondary: "#42627e"
        tertiary: "#88bdf2"
        highlight: "rgba(136, 189, 242, 0.14)"
        textHighlight: "#88bdf288"
      darkMode:
        light: "#202b36"
        lightgray: "#384959"
        gray: "#6a89a7"
        darkgray: "#c3d3e2"
        dark: "#e9f1f9"
        secondary: "#88bdf2"
        tertiary: "#bddffc"
        highlight: "rgba(136, 189, 242, 0.15)"
        textHighlight: "#88bdf299"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      condition: has-toc
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    options:
      # 파일은 날짜(파일명 프리픽스) 내림차순 = 최신 글 위, 폴더는 이름순
      sortFn: "(a, b) => { if (a.isFolder && !b.isFolder) return -1; if (!a.isFolder && b.isFolder) return 1; if (a.isFolder && b.isFolder) return (a.displayName || '').localeCompare(b.displayName || ''); return (b.slugSegment || '').localeCompare(a.slugSegment || '', undefined, { numeric: true }); }"
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: false
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
      condition: has-backlinks
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
      condition: not-index
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
      condition: not-index
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: false
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/mmporong
  - source: github:quartz-community/recent-notes
    enabled: false
    options:
      title: 최근 글
      limit: 20
      linkToMore: false
      showTags: false
      hideTagPages: true
      hideFolderPages: true
    layout:
      position: afterBody
      priority: 20
      condition: index
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
      condition: not-index
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: false
    order: 900
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
